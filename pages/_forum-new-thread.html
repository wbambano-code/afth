<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau fil — {{CAT_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,600;0,700;0,800;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>

<header class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <img class="nav-logo" src="/assets/images/logo.gif" alt="AFTh" onerror="this.style.display='none'">
      <div><span class="nav-name">AFTh</span><span class="nav-sub">Espace membre</span></div>
    </a>
    <nav>
      <ul class="nav-menu">
        <li><a href="/">Site public</a></li>
        <li><a href="/forum">💬 Forum</a></li>
        <li><a href="/membres/profil">👤 Profil</a></li>
        <li><a href="#" onclick="fetch('/membres/logout',{method:'POST'}).then(()=>location.href='/membres/login');return false;">↪ Déconnexion</a></li>
      </ul>
    </nav>
  </div>
</header>

<section style="padding:calc(var(--nav-h) + 2rem) 0 3rem;background:var(--c-bg-alt);min-height:80vh;">
  <div class="forum-wrap">
    <div class="forum-breadcrumb"><a href="/forum">💬 Forum</a> › <a href="/forum/c/{{CAT_SLUG}}">{{CAT_NAME}}</a> › <strong>Nouveau fil</strong></div>
    <div class="forum-head">
      <div><h1>✏️ Nouveau fil dans « {{CAT_NAME}} »</h1></div>
    </div>

    <form class="forum-section" style="padding:1.5rem;background:var(--c-white);" onsubmit="event.preventDefault();createThread()">
      <div class="field" style="margin-bottom:1rem;">
        <label style="display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-lt);margin-bottom:.35rem;">Titre du fil</label>
        <input type="text" id="th-title" maxlength="200" required style="width:100%;padding:.7rem .95rem;border:1.5px solid var(--c-border);border-radius:var(--rad);font-family:var(--font-b);font-size:.95rem;outline:none;">
      </div>
      <div class="field">
        <label style="display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--c-text-lt);margin-bottom:.35rem;">Premier message</label>
        <textarea id="th-body" required style="width:100%;min-height:220px;padding:.8rem .95rem;border:1.5px solid var(--c-border);border-radius:var(--rad);font-family:var(--font-b);font-size:.92rem;resize:vertical;outline:none;line-height:1.6;" placeholder="Décrivez votre question, votre retour d'expérience, ou le sujet que vous souhaitez aborder…"></textarea>
        <p class="md-hint">Formatage markdown : <code>**gras**</code> · <code>*italique*</code> · <code>[texte](url)</code> · <code>`code`</code> · <code>&gt; citation</code> · <code>- item</code></p>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem;">
        <button type="submit" class="btn btn-blue btn-sm">📨 Publier le fil</button>
        <a href="/forum/c/{{CAT_SLUG}}" class="btn btn-ghost btn-sm">Annuler</a>
      </div>
    </form>
  </div>
</section>

<div id="toast" style="position:fixed;bottom:1.5rem;right:1.5rem;background:var(--c-primary-dk);color:#fff;padding:.8rem 1.2rem;border-radius:var(--rad);font-size:.88rem;box-shadow:var(--sh-md);opacity:0;pointer-events:none;transition:all .25s;z-index:1000;"></div>

<script>
const CAT_ID = '{{CAT_ID}}';
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'err' ? '#991b1b' : '#059669';
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}
async function createThread() {
  const title = document.getElementById('th-title').value.trim();
  const body = document.getElementById('th-body').value.trim();
  if (!title || !body) return toast('Titre et message requis', 'err');
  try {
    const res = await fetch('/forum/api/threads', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ categoryId: parseInt(CAT_ID), title, body })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    location.href = '/forum/t/' + data.threadId;
  } catch (e) { toast('✗ ' + e.message, 'err'); }
}
</script>
</body>
</html>
